<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Contrast</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="dark">
    <div class="app-container">
        <header>
            <div class="lang-selector" id="langSelector"></div>
            <h1 id="mainTitle">LIVE FINANCIAL CONTRAST</h1>
            <button id="themeToggle" class="btn-tool">🌙</button>
        </header>

        <nav class="year-selector" id="yearSelector">
            <button class="active">2026</button>
            <button>2025</button>
            <button>2024</button>
        </nav>

        <nav class="time-tabs" id="timeTabs">
            <button data-unit="sec" class="active">per second</button>
            <button data-unit="min">per minute</button>
            <button data-unit="hour">per hour</button>
            <button data-unit="day">per day</button>
            <button data-unit="year">per year</button>
        </nav>

        <main class="contrast-grid">
            <div class="card spending" data-side="left" id="leftCard">
                <div class="card-header">
                    <img src="" id="leftIcon" class="entity-icon">
                    <div class="entity-info">
                        <h2 class="entity-name" id="leftName">...</h2>
                        <div class="entity-type" id="leftType">...</div>
                    </div>
                </div>
                <div class="visualizer"><div class="bar" id="leftBar"></div></div>
                <div class="counter-group">
                    <div class="cumulative" id="leftCumulative">0</div>
                    <div class="subtext">cumulative</div>
                </div>
                <div class="live-rate">
                    <span id="leftApprox" class="approx">≈</span>
                    <span id="leftRate">0.00</span> <small id="leftUnit">/ sec</small>
                </div>
                <div class="details-list" id="leftDetails"></div>
            </div>

            <div class="card income" data-side="right" id="rightCard">
                <div class="card-header">
                    <img src="" id="rightIcon" class="entity-icon">
                    <div class="entity-info">
                        <h2 class="entity-name" id="rightName">...</h2>
                        <div class="entity-type" id="rightType">...</div>
                    </div>
                </div>
                <div class="visualizer"><div class="bar" id="rightBar"></div></div>
                <div class="counter-group">
                    <div class="cumulative" id="rightCumulative">0</div>
                    <div class="subtext">cumulative</div>
                </div>
                <div class="live-rate">
                    <span id="rightApprox" class="approx">≈</span>
                    <span id="rightRate">0.00</span> <small id="rightUnit">/ sec</small>
                </div>
                <div class="details-list" id="rightDetails"></div>
            </div>
        </main>

        <div class="donate-section">
            <h3 id="donateTitle"></h3>
            <p id="donateDesc"></p>
            <a href="#" class="btn-donate" id="donateBtn">☕ Buy Me a Coffee</a>
        </div>
        <section id="seoContent" class="seo-block"></section>
        <footer>
            <span id="footerCreated"></span> <span class="brand-name">PandaDream</span> 🐼
            <div id="footerSlogan" class="footer-slogan"></div>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
